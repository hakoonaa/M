<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>هآكوناا</title>

  <!-- خط رقعة مميز -->
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #fbd3e9, #f5e1ff);
      --card-bg: rgba(255, 255, 255, 0.96);
      --accent: #e76f92;
      --accent-soft: #f3a6c0;
      --text-main: #4b2c3b;
      --text-soft: #7b5a6a;
      --rose: #f8b4c6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Aref Ruqaa", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .hidden {
      display: none;
    }

    .center-box {
      background: var(--card-bg);
      padding: 24px 28px;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(122, 74, 106, 0.25);
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.95);
      position: relative;
      overflow: hidden;
    }

    /* إطار ورود بسيط حول الصندوق */
    .center-box::before,
    .center-box::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 24px;
      border: 2px dashed rgba(231, 111, 146, 0.55);
      inset: 8px;
    }

    .center-box::after {
      border-style: solid;
      border-color: rgba(248, 180, 198, 0.7);
      inset: 14px;
    }

    .corner-rose {
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--rose);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(248, 180, 198, 0.45);
    }

    .corner-rose.top-right { top: 10px; right: 14px; }
    .corner-rose.top-left { top: 10px; left: 14px; }
    .corner-rose.bottom-right { bottom: 10px; right: 14px; }
    .corner-rose.bottom-left { bottom: 10px; left: 14px; }

    h1, h2, h3, p {
      margin: 0 0 12px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 28px;
      line-height: 1.8;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    h3 {
      font-size: 20px;
      color: var(--accent-soft);
      letter-spacing: 1px;
    }

    p {
      color: var(--text-soft);
      font-size: 14px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #e3c3d5;
      margin-top: 8px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-main);
      font-size: 15px;
      text-align: center;
      font-family: inherit;
      position: relative;
      z-index: 1;
    }

    input[type="password"]::placeholder {
      color: #c9b2c0;
      letter-spacing: 3px;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-soft);
      box-shadow: 0 0 0 2px rgba(231, 111, 146, 0.18);
    }

    button {
      width: 100%;
      padding: 10px 0;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(231, 111, 146, 0.35);
      font-family: inherit;
      position: relative;
      z-index: 1;
    }

    button:hover {
      background: #e45781;
      box-shadow: 0 10px 24px rgba(231, 111, 146, 0.45);
    }

    button:active {
      transform: scale(0.97);
    }

    .error {
      color: #e63946;
      font-size: 13px;
      min-height: 18px;
      margin-top: 4px;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .content-wrapper {
      max-width: 900px;
      width: 100%;
      padding: 28px 26px 24px;
      text-align: center;
      background: var(--card-bg);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(122, 74, 106, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.95);
      position: relative;
      overflow: hidden;
    }

    .content-wrapper::before,
    .content-wrapper::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 26px;
      border: 2px dashed rgba(231, 111, 146, 0.55);
      inset: 10px;
    }

    .content-wrapper::after {
      border-style: solid;
      border-color: rgba(248, 180, 198, 0.7);
      inset: 18px;
    }

    .content-rose {
      position: absolute;
      width: 26px;
      height: 26px;
      background: var(--rose);
      border-radius: 50%;
      box-shadow: 0 0 0 7px rgba(248, 180, 198, 0.45);
    }

    .content-rose.tr { top: 14px; right: 20px; }
    .content-rose.tl { top: 14px; left: 20px; }
    .content-rose.br { bottom: 14px; right: 20px; }
    .content-rose.bl { bottom: 14px; left: 20px; }

    .quote,
    .author,
    .gift-link {
      position: relative;
      z-index: 1;
    }

    .quote {
      font-size: 28px;
      margin-bottom: 10px;
      line-height: 1.9;
    }

    .author {
      font-size: 20px;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .gift-link {
      font-size: 16px;
      color: var(--accent);
      text-decoration: none;
    }

    .gift-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .quote {
        font-size: 22px;
      }
      .author {
        font-size: 18px;
      }
      .center-box, .content-wrapper {
        padding: 18px 18px 22px;
      }
    }
  </style>
</head>
<body>

  <!-- شاشة كلمة المرور -->
  <div id="login" class="center-box">
    <span class="corner-rose top-right"></span>
    <span class="corner-rose top-left"></span>
    <span class="corner-rose bottom-right"></span>
    <span class="corner-rose bottom-left"></span>

    <h2>أدخل الرمز السري</h2>
    <input
      type="password"
      id="passwordInput"
      placeholder="•••••"
      autocomplete="off"
    />
    <div id="error" class="error"></div>
    <button type="button" onclick="checkPassword()">دخول</button>
  </div>

  <!-- المحتوى المخفي -->
  <div id="content" class="content-wrapper hidden">
    <span class="content-rose tr"></span>
    <span class="content-rose tl"></span>
    <span class="content-rose br"></span>
    <span class="content-rose bl"></span>

    <h1 class="quote">عندما يقل الاهتمام<br>ينقطع حبل المودة</h1>
    <h3 class="author">هآكوناا</h3>

    <p>
      <a
        class="gift-link"
        href="https://drive.google.com/file/d/1KN7FURnoRSOLxP6RzsLpNHMi3CZhD9or/view?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
      >
        إهداء لك، انقري هنا
      </a>
    </p>
  </div>

  <script>
    const CORRECT_PASSWORD = "S&M"; // مخزّن فقط في الكود

    function checkPassword() {
      const input = document.getElementById("passwordInput").value.trim();
      const errorEl = document.getElementById("error");

      if (!input) {
        errorEl.textContent = "من فضلك أدخلي الرمز.";
        return;
      }

      if (input === CORRECT_PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
        errorEl.textContent = "";
      } else {
        errorEl.textContent = "الرمز غير صحيح.";
      }
    }

    document
      .getElementById("passwordInput")
      .addEventListener("keyup", function (e) {
        if (e.key === "Enter") {
          checkPassword();
        }
      });
  </script>

</body>
</html>
